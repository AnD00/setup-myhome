---
# dropbox
# Note: ~/Library/CloudStorage/Dropbox is managed by macOS File Provider;
# the Dropbox app creates it on sign-in, so we don't (and can't) chmod it here.
- name: check Dropbox directory exists
  stat:
    path: "{{ dropbox_dir }}"
  register: dropbox_dir_stat
- name: assert Dropbox is installed and signed in
  assert:
    that: dropbox_dir_stat.stat.exists
    fail_msg: "{{ dropbox_dir }} not found. Install Dropbox and sign in before running this playbook."
- name: create myhome-conf directory
  file:
    path: "{{ myhome_conf_dir }}"
    state: directory
    mode: 0755

# asdf
- shell: touch {{ myhome_conf_dir }}/tool-versions
- name: symbolic link for .tool-versions
  file:
    src: "{{ myhome_conf_dir }}/tool-versions"
    dest: ~/.tool-versions
    state: link
    force: yes

# aws
- name: create aws directory
  file:
    path: "{{ myhome_conf_dir }}/aws"
    state: directory
    mode: 0755
- name: symbolic link for .aws
  file:
    src: "{{ myhome_conf_dir }}/aws"
    dest: ~/.aws
    state: link
    force: yes

# bash
- shell: touch {{ myhome_conf_dir }}/bash_profile
- name: symbolic link for .bash_profile
  file:
    src: "{{ myhome_conf_dir }}/bash_profile"
    dest: ~/.bash_profile
    state: link
    force: yes
- shell: touch {{ myhome_conf_dir }}/bashrc
- name: symbolic link for .bashrc
  file:
    src: "{{ myhome_conf_dir }}/bashrc"
    dest: ~/.bashrc
    state: link
    force: yes

# config
- name: create config directory
  file:
    path: "{{ myhome_conf_dir }}/config"
    state: directory
    mode: 0755
- name: symbolic link for .config
  file:
    src: "{{ myhome_conf_dir }}/config"
    dest: ~/.config
    state: link
    force: yes

# git
- name: create git directory
  file:
    path: "{{ myhome_conf_dir }}/config/git"
    state: directory
    mode: 0755

# kube
- name: create kube directory
  file:
    path: "{{ myhome_conf_dir }}/kube"
    state: directory
    mode: 0755
- name: symbolic link for .kube
  file:
    src: "{{ myhome_conf_dir }}/kube"
    dest: ~/.kube
    state: link
    force: yes

# profile
- shell: touch {{ myhome_conf_dir }}/profile
- name: symbolic link for .profile
  file:
    src: "{{ myhome_conf_dir }}/profile"
    dest: ~/.profile
    state: link
    force: yes

# zsh
- shell: touch {{ myhome_conf_dir }}/zshenv
- name: symbolic link for .zshenv
  file:
    src: "{{ myhome_conf_dir }}/zshenv"
    dest: ~/.zshenv
    state: link
    force: yes
- shell: touch {{ myhome_conf_dir }}/zshrc
- name: symbolic link for .zshrc
  file:
    src: "{{ myhome_conf_dir }}/zshrc"
    dest: ~/.zshrc
    state: link
    force: yes
- name: set homebrew path
  lineinfile:
    dest: ~/.zshrc
    line: 'eval "$({{ homebrew_prefix }}/bin/brew shellenv)"'
