---
- name: create symlink for system Java wrappers
  file:
    src: "{{ homebrew_prefix }}/opt/openjdk/libexec/openjdk.jdk"
    dest: /Library/Java/JavaVirtualMachines/openjdk.jdk
    state: link
    force: yes
  become: true

- name: setup .zshrc for openjdk
  blockinfile:
    dest: ~/.zshrc
    content: |
      export PATH="{{ homebrew_prefix }}/opt/openjdk/bin:$PATH"
      export JAVA_HOME="$(/usr/libexec/java_home)"
      export CPPFLAGS="-I{{ homebrew_prefix }}/opt/openjdk/include"
    create: yes
    marker: "# {mark} ANSIBLE MANAGED BLOCK for openjdk"
